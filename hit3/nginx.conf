events {}

http {
    upstream servidores {
        server servidor1:8000 max_fails=1 fail_timeout=1;
        server servidor2:8000 max_fails=1 fail_timeout=1;
        server servidor3:8000 max_fails=1 fail_timeout=1;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://servidores;
        }
    }
}
